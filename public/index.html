<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tucson Music - Audio Dashboard</title>
    <link rel="stylesheet" href="/fsi.css" />
    <link rel="stylesheet" href="/app-overrides.css" />
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; max-width: 900px; }
      fieldset { margin-bottom: 1rem; }
      label { display: inline-block; min-width: 90px; }
      input, select, button { margin: 0.25rem 0; }
      pre { background: #111; color: #9df09d; padding: 1rem; overflow-x: auto; }
      .status { margin-bottom: 1rem; font-weight: bold; }
      .error { color: #b30000; }
    </style>
  </head>
  <body>
    <h1>Office Audio Control</h1>

    <fieldset>
      <legend>Dashboard Login</legend>
      <div><label>Password</label><input id="password" type="password" autocomplete="current-password" /> <button id="loginBtn" onclick="login()">Log In</button></div>
      <div><label>Bearer Token</label><input id="token" type="password" autocomplete="off" placeholder="Optional manual token" /> <button onclick="applyToken()">Use Token</button> <button onclick="clearToken()">Clear</button></div>
      <div class="status" id="authStatus">Not authenticated.</div>
      <div class="error" id="authError"></div>
      <small>Token is only kept in-memory for this tab session (not saved to localStorage).</small>
    </fieldset>

    <fieldset id="controls" disabled>
      <legend>DAX88 Zone Control</legend>
      <div><label>Zone</label><input id="zone" type="number" min="1" max="8" value="1" /></div>
      <div><label>Volume</label><input id="volume" type="number" min="0" max="38" value="15" /> <button onclick="setVolume()">Set Volume</button></div>
      <div>
        <label>Power</label>
        <select id="power"><option value="on">On</option><option value="off">Off</option></select>
        <button onclick="setPower()">Set Power</button>
      </div>
      <div><label>Source</label><input id="source" type="number" min="1" max="8" value="1" /> <button onclick="setSource()">Set Source</button></div>
    </fieldset>

    <fieldset>
      <legend>Up2Stream Status</legend>
      <button onclick="getStreamStatus()">Refresh Status</button>
      <div id="liveStatus" class="status">Live updates: disconnected</div>
    </fieldset>

    <pre id="output">Ready.</pre>

    <script>
      let authToken = null;

      function setAuthenticatedState(isAuthenticated, message = '') {
        document.getElementById('controls').disabled = !isAuthenticated;
        document.getElementById('authStatus').textContent = isAuthenticated
          ? 'Authenticated. Controls enabled.'
          : 'Not authenticated.';
        document.getElementById('authError').textContent = message;
      }

      function parseErrorPayload(payload, fallback) {
        if (!payload || typeof payload !== 'object') {
          return fallback;
        }
        return payload?.error?.message || payload?.message || fallback;
      }

      function isControlRoute(path) {
        return path.startsWith('/api/dax88/');
      }

      function normalizeToken(value) {
        return (value || "").trim();
      }

      function setToken(token) {
        authToken = normalizeToken(token) || null;
        document.getElementById('token').value = authToken || "";
        setAuthenticatedState(Boolean(authToken), authToken ? "" : "Log in or provide a bearer token to enable controls.");
      }

      function applyToken() {
        setToken(document.getElementById('token').value);
      }

      function clearToken() {
        setToken("");
      }

      function renderApiMessage(payload, status, path) {
        if (status === 401 || status === 403) {
          const message = isControlRoute(path)
            ? 'Unauthorized for control request. Please log in again or provide a valid token.'
            : 'Request was denied by the server.';
          document.getElementById('authError').textContent = message;
          if (isControlRoute(path)) {
            clearToken();
          }
          return;
        }

        if (status === 503) {
          document.getElementById('authError').textContent = 'Service temporarily unavailable (503). Hardware or backend may be restarting. Please retry shortly.';
          return;
        }

        if (status >= 400) {
          document.getElementById('authError').textContent = parseErrorPayload(payload, `Request failed with status ${status}.`);
          return;
        }

        document.getElementById('authError').textContent = '';
      }


      let stateStream = null;
      let reconnectTimer = null;
      let liveState = {
        stream: null,
        zones: {},
        hardware: null
      };

      function renderLiveState() {
        const snapshot = {
          liveState,
          auth: { authenticated: Boolean(authToken) },
          updatedAt: new Date().toISOString()
        };
        document.getElementById('output').textContent = JSON.stringify(snapshot, null, 2);
      }

      function updateLiveStatusLabel(message, isError = false) {
        const liveStatus = document.getElementById('liveStatus');
        liveStatus.textContent = `Live updates: ${message}`;
        liveStatus.className = isError ? 'status error' : 'status';
      }

      function connectStateStream() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (stateStream) {
          stateStream.close();
        }

        stateStream = new EventSource('/api/state/stream');

        stateStream.onopen = () => {
          updateLiveStatusLabel('connected');
        };

        stateStream.onmessage = (event) => {
          const payload = JSON.parse(event.data || '{}');
          liveState = {
            stream: payload.stream || liveState.stream,
            zones: payload.zones || liveState.zones,
            hardware: payload.hardware || liveState.hardware
          };
          renderLiveState();
        };

        stateStream.onerror = () => {
          updateLiveStatusLabel('reconnecting...', true);
          stateStream.close();
          reconnectTimer = setTimeout(connectStateStream, 3000);
        };
      }

      async function api(path, method = 'GET', body) {
        const headers = { 'Content-Type': 'application/json' };
        if (isControlRoute(path) && authToken) {
          headers.Authorization = `Bearer ${authToken}`;
        }

        let response;
        let payload;

        try {
          response = await fetch(path, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined
          });

          const contentType = response.headers.get('content-type') || "";
          payload = contentType.includes('application/json')
            ? await response.json()
            : { message: await response.text() };
        } catch (error) {
          const networkPayload = {
            success: false,
            error: { code: 'NETWORK_ERROR', message: error.message }
          };
          document.getElementById('output').textContent = JSON.stringify(networkPayload, null, 2);
          document.getElementById('authError').textContent = `Network request failed: ${error.message}`;
          return;
        }

        document.getElementById('output').textContent = JSON.stringify(payload, null, 2);
        renderApiMessage(payload, response.status, path);
      }

      async function login() {
        const password = document.getElementById('password').value;
        document.getElementById('authError').textContent = '';
        document.getElementById('loginBtn').disabled = true;

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });
          const payload = await response.json();
          if (!response.ok) {
            authToken = null;
            setAuthenticatedState(false, parseErrorPayload(payload, 'Authentication failed.'));
            return;
          }

          const token = payload?.data?.token || "";
          if (!token) {
            setAuthenticatedState(false, 'Authentication failed: server did not return a token.');
            return;
          }

          setToken(token);
          document.getElementById('password').value = '';
        } catch (error) {
          setAuthenticatedState(false, `Login request failed: ${error.message}`);
        } finally {
          document.getElementById('loginBtn').disabled = false;
        }
      }

      function setVolume() {
        return api('/api/dax88/volume', 'POST', {
          target: String(document.getElementById('zone').value).padStart(2, '0'),
          volume: Number(document.getElementById('volume').value)
        });
      }

      function setPower() {
        return api('/api/dax88/power', 'POST', {
          zone: Number(document.getElementById('zone').value),
          power: document.getElementById('power').value
        });
      }

      function setSource() {
        return api('/api/dax88/source', 'POST', {
          target: String(document.getElementById('zone').value).padStart(2, '0'),
          source: Number(document.getElementById('source').value)
        });
      }

      function getStreamStatus() {
        return api('/api/stream/status');
      }

      setAuthenticatedState(false, 'Log in or provide a bearer token to enable controls.');
      connectStateStream();
    </script>
  </body>
</html>
